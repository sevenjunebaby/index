<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oasis Bio Product</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0c0a;
  color: #e6d3b3;
  overflow-x: hidden;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 50px;
}

.logo {
  font-size: 28px;
  font-weight: bold;
  transform: perspective(500px) rotateY(20deg);
  transition: 0.5s;
}

.logo:hover {
  transform: perspective(500px) rotateY(0deg) scale(1.1);
}

.hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 50px;
}

.text {
  max-width: 500px;
}

.text h1 {
  font-size: 48px;
}

.text p {
  color: #c2a97a;
}

.btn {
  padding: 12px 25px;
  border: none;
  background: linear-gradient(45deg, #c2a97a, #8b6b3f);
  color: black;
  cursor: pointer;
  margin-top: 20px;
}

.product {
  width: 300px;
  height: 400px;
  background: linear-gradient(145deg, #1c1713, #2a231d);
  border-radius: 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.8);
  transform: rotateY(25deg);
  transition: 0.5s;
}

.product:hover {
  transform: rotateY(0deg) scale(1.05);
}

.product::before {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 20px;
  box-shadow: inset 0 0 30px rgba(255,255,255,0.05);
}

.features {
  padding: 50px;
  display: flex;
  justify-content: space-around;
}

.card {
  width: 200px;
  padding: 20px;
  background: #1a1512;
  border-radius: 15px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

footer {
  text-align: center;
  padding: 20px;
  color: #8b6b3f;
}
</style>
</head>
<body>

<header>
  <div class="logo">OASIS BIO</div>
  <nav>
    <a style="color:#e6d3b3; margin-right:20px;">Home</a>
    <a style="color:#e6d3b3; margin-right:20px;">Products</a>
    <a style="color:#e6d3b3;">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="text">
    <h1>Pure Organic Energy</h1>
    <p>Premium Oasis Bio product crafted with natural ingredients for high performance and wellness.</p>
    <button class="btn">Buy Now</button>
  </div>
  <div class="product" id="product"></div>
</section>

<section class="features">
  <div class="card">100% Organic</div>
  <div class="card">Eco Friendly</div>
  <div class="card">Premium Quality</div>
</section>

<footer>
  © 2026 Oasis Bio
</footer>

<script>
const product = document.getElementById('product');

document.addEventListener('mousemove', (e) => {
  let x = (window.innerWidth / 2 - e.pageX) / 25;
  let y = (window.innerHeight / 2 - e.pageY) / 25;
  product.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});
</script>

</body>
</html>
