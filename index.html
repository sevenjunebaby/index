<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco Water Filter</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #06121a;
  color: #cce7ff;
  overflow-x: hidden;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 50px;
}

.logo {
  font-size: 28px;
  font-weight: bold;
  color: #4fc3f7;
  transform: perspective(500px) rotateY(20deg);
  transition: 0.5s;
}

.logo:hover {
  transform: perspective(500px) rotateY(0deg) scale(1.1);
}

/* HERO */
.hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 60px;
}

.text {
  max-width: 500px;
}

.text h1 {
  font-size: 48px;
  color: #4fc3f7;
}

.text p {
  color: #9ed4ff;
}

.btn {
  padding: 12px 25px;
  border: none;
  background: linear-gradient(45deg, #4fc3f7, #0288d1);
  color: #001018;
  cursor: pointer;
  margin-top: 20px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

/* PRODUCT BOTTLE */
.product {
  width: 180px;
  height: 420px;
  position: relative;
  transform-style: preserve-3d;
  transition: 0.5s;
}

/* bottle body */
.bottle {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 90px 90px 40px 40px;
  background: linear-gradient(145deg, #0d2a3a, #0a1f2b);
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  overflow: hidden;
}

/* water animation */
.water {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 60%;
  background: linear-gradient(#4fc3f7, #0288d1);
  animation: wave 3s infinite ease-in-out;
  border-radius: 50%;
  opacity: 0.8;
}

/* bottle cap */
.cap {
  position: absolute;
  top: -40px;
  left: 35%;
  width: 50px;
  height: 50px;
  background: #0288d1;
  border-radius: 10px;
}

/* FEATURES */
.features {
  padding: 50px;
  display: flex;
  justify-content: space-around;
}

.card {
  width: 200px;
  padding: 20px;
  background: #0b1e29;
  border-radius: 15px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #4fc3f7;
}

/* ANIMATIONS */
@keyframes wave {
  0% { transform: translateY(0) scaleX(1); }
  50% { transform: translateY(-10px) scaleX(1.05); }
  100% { transform: translateY(0) scaleX(1); }
}
</style>
</head>

<body>

<header>
  <div class="logo">ECO FILTER</div>
  <nav>
    <a style="color:#cce7ff; margin-right:20px;">Home</a>
    <a style="color:#cce7ff; margin-right:20px;">Technology</a>
    <a style="color:#cce7ff;">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="text">
    <h1>Pure Water. Zero Compromise.</h1>
    <p>Advanced eco water filter designed to remove impurities and deliver clean, safe drinking water with sustainable technology.</p>
    <button class="btn">Buy Now</button>
  </div>

  <div class="product" id="product">
    <div class="cap"></div>
    <div class="bottle">
      <div class="water"></div>
    </div>
  </div>
</section>

<section class="features">
  <div class="card">99.9% Filtration</div>
  <div class="card">Eco Materials</div>
  <div class="card">Long Life Filter</div>
</section>

<footer>
  © 2026 Eco Water Filter
</footer>

<script>
const product = document.getElementById('product');

document.addEventListener('mousemove', (e) => {
  let x = (window.innerWidth / 2 - e.pageX) / 30;
  let y = (window.innerHeight / 2 - e.pageY) / 30;
  product.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});
</script>

</body>
</html>
